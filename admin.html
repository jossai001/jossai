<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joss Ai 🦆 Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background: radial-gradient(circle at top left, #451a03, #1a0600, #020617); 
            color: #f8fafc; 
        }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .glass-input { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(234, 179, 8, 0.3); 
            color: #e2e8f0; 
            outline: none; 
        }
        .glass-input:focus { border-color: #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.3); }
        .auth-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); z-index: 100; display: flex; justify-content: center; align-items: center; }
        
        input[type="checkbox"] { width: 1.25rem; height: 1.25rem; accent-color: #f97316; cursor: pointer; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col relative overflow-hidden">

    <div id="authScreen" class="auth-overlay flex flex-col items-center">
        <div class="glass-panel p-10 rounded-3xl shadow-2xl w-[90%] max-w-md text-center border border-orange-500/50">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 mb-2">🦆 Admin Portal</h1>
            <p class="text-orange-200 mb-8 text-sm tracking-wide">เฉพาะผู้ดูแลระบบเท่านั้น</p>
            <button onclick="loginAdmin()" class="w-full bg-white text-gray-800 font-bold py-4 px-6 text-lg rounded-xl flex items-center justify-center gap-3 hover:bg-gray-100 transition shadow-lg hover:scale-105">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                เข้าสู่ระบบผู้ดูแล
            </button>
        </div>
    </div>

    <div id="mainArea" class="hidden flex-1 flex flex-col h-full">
        <header class="h-20 glass-panel flex items-center justify-between px-8 z-10 shadow-md border-b border-orange-500/30">
            <div class="flex items-center gap-3">
                <span class="text-3xl">⚙️</span>
                <h1 class="text-2xl font-extrabold tracking-wide text-white uppercase">Joss Ai <span class="text-orange-500">Dashboard</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-sm font-bold text-orange-200" id="adminEmailDisplay">ongapisitphuket@gmail.com</div>
                <button onclick="logoutAdmin()" class="text-sm bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg transition shadow-md font-bold">ออกจากระบบ</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-2 glass-panel p-6 md:p-8 rounded-3xl border border-slate-700 shadow-xl flex flex-col h-[80vh]">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                        <h2 class="text-2xl font-bold text-white flex items-center gap-2">👥 รายชื่อนักเรียนในระบบ <span id="totalUsers" class="text-sm bg-orange-500/20 text-orange-400 px-3 py-1 rounded-full ml-2">0 คน</span></h2>
                        <button onclick="loadUsers()" class="text-slate-300 hover:text-white transition bg-slate-800 px-4 py-2 rounded-lg text-sm">🔄 รีเฟรช</button>
                    </div>

                    <div class="flex justify-between items-center bg-slate-900/50 p-4 rounded-xl mb-4 border border-slate-700">
                        <label class="flex items-center gap-3 text-white font-bold cursor-pointer select-none">
                            <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)">
                            เลือกทั้งหมด
                        </label>
                        <button onclick="deleteSelected()" class="bg-red-600 hover:bg-red-500 text-white font-bold px-6 py-2 rounded-lg transition shadow-lg flex items-center gap-2">
                            🗑️ ลบที่เลือก (<span id="selectedCount">0</span>)
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto rounded-xl border border-slate-700 bg-slate-900/30">
                        <table class="w-full text-left text-sm text-slate-300">
                            <thead class="bg-slate-800 text-slate-200 sticky top-0 z-10 shadow-sm">
                                <tr>
                                    <th class="p-4 w-16 text-center border-b border-slate-600">เลือก</th>
                                    <th class="p-4 border-b border-slate-600">อีเมลนักเรียน (Email)</th>
                                    <th class="p-4 w-32 text-center border-b border-slate-600">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody" class="divide-y divide-slate-700/50">
                                <tr><td colspan="3" class="p-8 text-center text-slate-500">กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="glass-panel p-6 md:p-8 rounded-3xl border border-slate-700 shadow-xl h-fit">
                    <h2 class="text-2xl font-bold text-green-400 flex items-center gap-2 mb-2">➕ เพิ่มนักเรียนใหม่</h2>
                    <p class="text-sm text-slate-400 mb-6 border-b border-slate-700 pb-4">เพิ่มทีละหลายคนได้ โดยการกด Enter ให้อยู่บรรทัดละ 1 อีเมล</p>
                    
                    <textarea id="newEmails" rows="10" class="w-full glass-input rounded-xl p-4 text-sm font-mono resize-none mb-6 placeholder-slate-500" placeholder="student1@gmail.com&#10;student2@gmail.com&#10;student3@gmail.com"></textarea>
                    
                    <button onclick="addUsersBulk()" class="w-full bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white font-bold py-4 rounded-xl transition shadow-lg text-lg flex justify-center items-center gap-2">
                        บันทึกเข้าระบบ 🚀
                    </button>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsN-c-__MAMAXmvXTHjPLs1pgD38iBSqs",
            authDomain: "jossai-5a857.firebaseapp.com",
            projectId: "jossai-5a857",
            storageBucket: "jossai-5a857.firebasestorage.app",
            messagingSenderId: "1080088885354",
            appId: "1:1080088885354:web:693ae4350e49fe37c53213"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 🚨 ล็อกสิทธิ์เข้าถึงเหลือแค่อีเมลของบอสคนเดียวเท่านั้น 🚨
        const SUPER_ADMINS = ["ongapisitphuket@gmail.com"]; 

        let allUsersData = [];

        window.loginAdmin = async function() {
            try {
                const result = await signInWithPopup(auth, provider);
                checkAdminAccess(result.user.email.toLowerCase().trim());
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการล็อกอิน' });
            }
        };

        function checkAdminAccess(email) {
            // ตรวจสอบอย่างเข้มงวด ต้องตรงกับ array SUPER_ADMINS เป๊ะๆ
            if (SUPER_ADMINS.includes(email)) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainArea').classList.remove('hidden');
                document.getElementById('adminEmailDisplay').innerText = email;
                loadUsers(); 
            } else {
                signOut(auth);
                Swal.fire({ icon: 'error', title: 'การเข้าถึงถูกปฏิเสธ', text: 'คุณไม่มีสิทธิ์เข้าถึงหน้านี้ครับ' });
            }
        }

        window.logoutAdmin = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, user => { 
            if(user) checkAdminAccess(user.email.toLowerCase().trim()); 
        });

        // ------------------ ระบบดึงข้อมูลและแสดงผล ------------------ //

        window.loadUsers = async function() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-orange-400 font-bold animate-pulse">กำลังดึงข้อมูลจากฐานข้อมูล...</td></tr>';
            document.getElementById('selectAllCheckbox').checked = false;
            updateSelectedCount();
            allUsersData = [];

            try {
                const q = query(collection(db, "allowed_users")); 
                const querySnapshot = await getDocs(q);
                
                querySnapshot.forEach((doc) => {
                    if(doc.data().email) {
                        allUsersData.push({ id: doc.id, email: doc.data().email });
                    }
                });

                allUsersData.sort((a, b) => a.email.localeCompare(b.email));
                document.getElementById('totalUsers').innerText = `${allUsersData.length} คน`;
                renderTable();

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-red-500">เกิดข้อผิดพลาด: ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบ Firebase Rules</td></tr>`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            if (allUsersData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-slate-500">ยังไม่มีรายชื่อนักเรียนในระบบ</td></tr>';
                return;
            }

            allUsersData.forEach(user => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/50 transition group";
                tr.innerHTML = `
                    <td class="p-4 text-center">
                        <input type="checkbox" class="user-checkbox" value="${user.id}" onchange="updateSelectedCount()">
                    </td>
                    <td class="p-4 font-mono text-orange-100 text-base">${user.email}</td>
                    <td class="p-4 text-center flex justify-center gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity duration-200">
                        <button onclick="editUser('${user.id}', '${user.email}')" class="text-slate-400 hover:text-blue-400 bg-slate-800 hover:bg-slate-700 p-2 rounded-lg transition shadow-sm border border-slate-600" title="แก้ไขอีเมล">✏️</button>
                        <button onclick="deleteOneUser('${user.id}', '${user.email}')" class="text-slate-400 hover:text-red-500 bg-slate-800 hover:bg-slate-700 p-2 rounded-lg transition shadow-sm border border-slate-600" title="ลบคนนี้">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ------------------ ระบบแก้ไขอีเมล (Edit) ------------------ //

        window.editUser = async function(id, oldEmail) {
            const { value: newEmail } = await Swal.fire({
                title: '✏️ แก้ไขอีเมล',
                input: 'email',
                inputLabel: 'ตรวจสอบและแก้ไขอีเมลให้ถูกต้อง',
                inputValue: oldEmail,
                showCancelButton: true,
                confirmButtonColor: '#ea580c',
                cancelButtonColor: '#475569',
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                inputValidator: (value) => {
                    if (!value) return 'ต้องใส่อีเมลนะครับบอส!'
                }
            });

            if (newEmail && newEmail.toLowerCase().trim() !== oldEmail.toLowerCase().trim()) {
                Swal.fire({ title: 'กำลังอัปเดต...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const docRef = doc(db, "allowed_users", id);
                    await updateDoc(docRef, { email: newEmail.toLowerCase().trim() });
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'อัปเดตอีเมลเรียบร้อย!', showConfirmButton: false, timer: 2000 });
                    loadUsers(); 
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'อัปเดตไม่สำเร็จ', text: error.message });
                }
            }
        }

        // ------------------ ระบบ Checkbox & ลบ ------------------ //

        window.toggleSelectAll = function(checkbox) {
            const checkboxes = document.querySelectorAll('.user-checkbox');
            checkboxes.forEach(cb => cb.checked = checkbox.checked);
            updateSelectedCount();
        }

        window.updateSelectedCount = function() {
            const checked = document.querySelectorAll('.user-checkbox:checked').length;
            document.getElementById('selectedCount').innerText = checked;
        }

        window.deleteSelected = async function() {
            const checkboxes = document.querySelectorAll('.user-checkbox:checked');
            if (checkboxes.length === 0) {
                Swal.fire({ toast: true, position: 'top-end', icon: 'warning', title: 'โปรดเลือกอย่างน้อย 1 คน', showConfirmButton: false, timer: 2000 });
                return;
            }

            const confirm = await Swal.fire({
                title: `ยืนยันการลบ ${checkboxes.length} รายการ?`,
                text: "ลบแล้วนักเรียนกลุ่มนี้จะเข้าเว็บไม่ได้ทันที!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                cancelButtonColor: '#475569',
                confirmButtonText: 'ใช่, ลบเลย!'
            });

            if (confirm.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    for (let cb of checkboxes) {
                        await deleteDoc(doc(db, "allowed_users", cb.value));
                    }
                    Swal.fire({ icon: 'success', title: 'ลบสำเร็จ!', text: `ตัดสิทธิ์ ${checkboxes.length} คนเรียบร้อยแล้ว` });
                    loadUsers(); 
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'ลบไม่สำเร็จ', text: error.message });
                }
            }
        }

        window.deleteOneUser = async function(id, email) {
            const confirm = await Swal.fire({
                title: `ตัดสิทธิ์คนนี้?`,
                text: email,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                cancelButtonColor: '#475569',
                confirmButtonText: 'ลบ'
            });

            if (confirm.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "allowed_users", id));
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'ลบสำเร็จ', showConfirmButton: false, timer: 2000 });
                    loadUsers();
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'ลบไม่สำเร็จ', text: error.message });
                }
            }
        }

        // ------------------ ระบบเพิ่มรายชื่อ (Bulk Add) ------------------ //

        window.addUsersBulk = async function() {
            const rawText = document.getElementById('newEmails').value;
            if (!rawText.trim()) {
                Swal.fire({ toast: true, position: 'top-end', icon: 'warning', title: 'ยังไม่ได้ใส่อีเมลเลยครับ', showConfirmButton: false, timer: 2000 });
                return;
            }

            const newEmails = rawText.split('\n')
                .map(e => e.toLowerCase().trim())
                .filter(e => e.includes('@'));

            if (newEmails.length === 0) {
                Swal.fire({ icon: 'error', title: 'รูปแบบไม่ถูกต้อง', text: 'ตรวจไม่พบรูปแบบอีเมล (ต้องมี @)' });
                return;
            }

            Swal.fire({ title: `กำลังเพิ่ม ${newEmails.length} อีเมล...`, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const collectionRef = collection(db, "allowed_users");
                let addedCount = 0;
                let skippedCount = 0;

                for (let email of newEmails) {
                    const exists = allUsersData.find(u => u.email === email);
                    if (!exists) {
                        await addDoc(collectionRef, { email: email });
                        addedCount++;
                    } else {
                        skippedCount++;
                    }
                }

                document.getElementById('newEmails').value = ''; 
                Swal.fire({ 
                    icon: 'success', 
                    title: 'บันทึกสำเร็จ!', 
                    text: `เพิ่มใหม่: ${addedCount} คน | ข้าม(มีซ้ำแล้ว): ${skippedCount} คน` 
                });
                loadUsers(); 

            } catch (error) {
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: error.message });
            }
        }
    </script>
</body>
</html>
