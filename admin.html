<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joss Ai 🦆 Admin Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: radial-gradient(circle at bottom right, #0f172a, #020617, #000000); 
            color: #f8fafc; 
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(59, 130, 246, 0.2); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .glass-input { 
            background: rgba(2, 6, 23, 0.6); 
            border: 1px solid rgba(59, 130, 246, 0.4); 
            color: #e2e8f0; 
            outline: none; 
            transition: all 0.3s ease; 
        }
        .glass-input:focus { border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .auth-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 100; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-base relative">

    <div id="authScreen" class="auth-overlay flex flex-col items-center transition-opacity duration-500">
        <div class="glass-panel p-10 rounded-3xl shadow-2xl w-[90%] md:w-[28rem] text-center border-t-4 border-t-blue-500">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 mb-3">🛡️ Joss Ai</h1>
            <p class="text-blue-200 mb-8 text-lg font-bold tracking-widest uppercase">Command Center</p>
            <div id="loginForm">
                <button onclick="loginAdmin()" class="w-full bg-white text-gray-900 font-black py-4 px-6 text-lg rounded-xl flex items-center justify-center gap-3 hover:bg-gray-200 transition shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:scale-105">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                    ยืนยันตัวตนระดับผู้บัญชาการ
                </button>
            </div>
            <div id="errorForm" class="hidden mt-6">
                <div class="text-red-500 mb-2 text-4xl">❌</div>
                <h2 class="text-xl font-bold text-red-400">การเข้าถึงถูกปฏิเสธ</h2>
                <p class="text-slate-400 text-sm mt-2">พื้นที่นี้สำหรับ บอส (Admin) เท่านั้นครับ</p>
                <button onclick="resetLogin()" class="mt-4 text-blue-400 text-sm hover:text-blue-300 underline">ลองบัญชีอื่น</button>
            </div>
        </div>
    </div>

    <main id="adminDashboard" class="hidden flex flex-col h-screen">
        <header class="h-20 glass-panel flex items-center justify-between px-8 z-10 border-b border-blue-900/50 sticky top-0">
            <div class="flex items-center gap-4">
                <span class="text-3xl">🛡️</span>
                <h1 class="text-2xl font-black text-white uppercase tracking-wider">Admin <span class="text-blue-500">Panel</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right border-r border-slate-700 pr-6 hidden sm:block">
                    <div class="text-xs text-slate-400 uppercase font-bold">Logged in as</div>
                    <div class="text-sm font-bold text-blue-400" id="adminEmailDisplay">boss@gmail.com</div>
                </div>
                <button onclick="logoutAdmin()" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/50 px-5 py-2 rounded-lg text-sm font-bold transition">ออกจากระบบ</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass-panel p-6 rounded-2xl">
                        <h2 class="text-xl font-black text-blue-400 mb-4 flex items-center gap-2">
                            <span>➕</span> เพิ่มสิทธิ์นักเรียนใหม่
                        </h2>
                        <form id="addUserForm" onsubmit="addStudent(event)">
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">อีเมลนักเรียน (Gmail)</label>
                            <input type="email" id="newStudentEmail" required class="w-full glass-input rounded-xl p-4 text-sm mb-4" placeholder="student@gmail.com">
                            <button type="submit" id="btnAdd" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-black py-4 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                                อนุมัติสิทธิ์เข้าเรียน
                            </button>
                        </form>
                    </div>

                    <div class="glass-panel p-6 rounded-2xl flex items-center justify-between">
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase">นักเรียนทั้งหมดในระบบ</p>
                            <h3 class="text-4xl font-black text-white mt-1" id="totalStudents">0</h3>
                        </div>
                        <div class="text-5xl opacity-50">🎓</div>
                    </div>
                </div>

                <div class="lg:col-span-2 glass-panel p-6 rounded-2xl flex flex-col h-[75vh]">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-xl font-black text-white flex items-center gap-2">
                            <span>📋</span> ฐานข้อมูลนักเรียน
                        </h2>
                        <div class="relative w-full sm:w-64">
                            <input type="text" id="searchInput" onkeyup="searchStudent()" class="w-full glass-input rounded-full py-2 pl-10 pr-4 text-sm" placeholder="ค้นหาอีเมล...">
                            <span class="absolute left-3 top-2.5 text-slate-400">🔍</span>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto pr-2">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-700 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                    <th class="pb-3 pl-2">ลำดับ</th>
                                    <th class="pb-3">อีเมล (Email)</th>
                                    <th class="pb-3 text-right pr-2">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody" class="text-sm">
                                <tr><td colspan="3" class="text-center py-10 text-slate-500">กำลังโหลดฐานข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, setDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔥 ก๊อปปี้ Config ตัวเดิมของบอสมาวางได้เลยครับ 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyBsN-c-__MAMAXmvXTHjPLs1pgD38iBSqs",
            authDomain: "jossai-5a857.firebaseapp.com",
            projectId: "jossai-5a857",
            storageBucket: "jossai-5a857.firebasestorage.app",
            messagingSenderId: "1080088885354",
            appId: "1:1080088885354:web:693ae4350e49fe37c53213",
            measurementId: "G-7PHD69E0W7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 🚨 ระบุอีเมลบอสที่เข้าหน้านี้ได้ (ห้ามคนอื่นเข้า) 🚨
        const MASTER_ADMIN_EMAIL = "ongapisitphuket@gmail.com"; 

        let studentList = []; // เก็บรายชื่อไว้ในตัวแปรเพื่อใช้ระบบค้นหา

        // 1. ระบบ Login แอดมิน
        window.loginAdmin = async function() {
            try {
                const result = await signInWithPopup(auth, provider);
                checkAdminStatus(result.user.email);
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'ล็อกอินล้มเหลว', background: '#0f172a', color: '#fff' });
            }
        };

        function checkAdminStatus(email) {
            const userEmail = email.toLowerCase().trim();
            // เช็กว่าเป็นอีเมลบอส หรือมีคำว่า admin
            if (userEmail === MASTER_ADMIN_EMAIL || userEmail.includes("admin")) {
                document.getElementById('authScreen').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('adminDashboard').classList.remove('hidden');
                    document.getElementById('adminEmailDisplay').innerText = userEmail;
                    fetchStudents(); // โหลดข้อมูลทันทีที่เข้าได้
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'ยินดีต้อนรับผู้บัญชาการ 🛡️', showConfirmButton: false, timer: 3000 });
                }, 500);
            } else {
                // ถ้าไม่ใช่แอดมิน ให้เด้งออก
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('errorForm').classList.remove('hidden');
                signOut(auth);
            }
        }

        window.resetLogin = () => {
            document.getElementById('errorForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        };

        window.logoutAdmin = () => {
            Swal.fire({
                title: 'ออกจากระบบ?',
                text: "ต้องการปิดแผงควบคุมใช่หรือไม่?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'ออกจากระบบ',
                cancelButtonText: 'ยกเลิก',
                background: '#0f172a', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth).then(() => location.reload());
                }
            });
        };

        // ตรวจสอบสถานะค้างไว้ (ถ้า Refresh หน้าเว็บ)
        onAuthStateChanged(auth, user => { 
            if(user) checkAdminStatus(user.email); 
        });

        // ==========================================
        // 🚨 ระบบจัดการฐานข้อมูลนักเรียน (CRUD) 🚨
        // ==========================================

        // 2. ดึงข้อมูลนักเรียนทั้งหมดมาแสดง
        async function fetchStudents() {
            try {
                const q = query(collection(db, "allowed_users")); // อาจจะใช้ orderBy ถ้ามีฟิลด์ timestamp
                const querySnapshot = await getDocs(q);
                studentList = [];
                querySnapshot.forEach((doc) => {
                    studentList.push({ id: doc.id, ...doc.data() });
                });
                
                // เรียงตามตัวอักษร (A-Z)
                studentList.sort((a, b) => a.email.localeCompare(b.email));
                
                renderTable(studentList);
            } catch (error) {
                console.error("Error fetching docs: ", error);
                Swal.fire({ icon: 'error', title: 'โหลดข้อมูลไม่สำเร็จ', text: error.message, background: '#0f172a', color: '#fff' });
            }
        }

        // 3. ฟังก์ชันวาดตาราง
        function renderTable(listToRender) {
            const tbody = document.getElementById('studentTableBody');
            document.getElementById('totalStudents').innerText = listToRender.length;
            
            if (listToRender.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-slate-500 font-bold">ยังไม่มีรายชื่อนักเรียนในระบบ</td></tr>`;
                return;
            }

            let html = '';
            listToRender.forEach((student, index) => {
                html += `
                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition group">
                        <td class="py-4 pl-3 text-slate-400 font-mono">${index + 1}</td>
                        <td class="py-4 font-bold text-blue-100">${student.email}</td>
                        <td class="py-4 text-right pr-2">
                            <button onclick="deleteStudent('${student.email}')" class="bg-red-500/10 text-red-500 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition opacity-50 group-hover:opacity-100">
                                ลบสิทธิ์
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // 4. ฟังก์ชันค้นหานักเรียน (Search)
        window.searchStudent = function() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const filteredList = studentList.filter(student => student.email.toLowerCase().includes(keyword));
            renderTable(filteredList);
        }

        // 5. เพิ่มนักเรียนใหม่
        window.addStudent = async function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('newStudentEmail');
            const newEmail = emailInput.value.toLowerCase().trim();
            const btnAdd = document.getElementById('btnAdd');

            if (!newEmail) return;

            // เช็กว่าซ้ำไหม
            if (studentList.some(s => s.email === newEmail)) {
                Swal.fire({ icon: 'warning', title: 'อีเมลนี้มีอยู่แล้ว!', text: 'นักเรียนคนนี้อยู่ในระบบแล้วครับ', background: '#0f172a', color: '#fff' });
                return;
            }

            btnAdd.disabled = true;
            btnAdd.innerHTML = '<span class="animate-spin text-xl">⏳</span> กำลังบันทึก...';

            try {
                // ใช้ email เป็น Document ID เพื่อให้เช็ก/ลบง่าย
                await setDoc(doc(db, "allowed_users", newEmail), {
                    email: newEmail,
                    addedAt: new Date().toISOString()
                });

                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'เพิ่มนักเรียนสำเร็จ! 🎓', showConfirmButton: false, timer: 2000 });
                emailInput.value = '';
                fetchStudents(); // โหลดตารางใหม่
            } catch (error) {
                console.error("Error adding document: ", error);
                Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: error.message, background: '#0f172a', color: '#fff' });
            } finally {
                btnAdd.disabled = false;
                btnAdd.innerHTML = 'อนุมัติสิทธิ์เข้าเรียน';
            }
        }

        // 6. ลบสิทธิ์นักเรียน
        window.deleteStudent = function(emailToDelete) {
            Swal.fire({
                title: 'ยืนยันการลบสิทธิ์?',
                html: `ต้องการเตะ <b>${emailToDelete}</b> <br>ออกจากระบบใช่หรือไม่?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#334155',
                confirmButtonText: 'ใช่, ลบเลย!',
                cancelButtonText: 'ยกเลิก',
                background: '#0f172a', color: '#fff'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        // ลบ Document ที่ชื่อเป็น email นั้น
                        await deleteDoc(doc(db, "allowed_users", emailToDelete));
                        
                        // เคลียร์ Session ด้วยเผื่อเขาออนไลน์อยู่ จะได้เด้งออกทันที
                        try {
                            await deleteDoc(doc(db, "user_sessions", emailToDelete));
                        } catch(e) { console.log("No active session to delete"); }

                        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'ลบสิทธิ์เรียบร้อย! 🥾', showConfirmButton: false, timer: 2000 });
                        fetchStudents(); // โหลดตารางใหม่
                    } catch (error) {
                        console.error("Error deleting document: ", error);
                        Swal.fire({ icon: 'error', title: 'ลบไม่สำเร็จ', text: error.message, background: '#0f172a', color: '#fff' });
                    }
                }
            });
        }
    </script>
</body>
</html>
